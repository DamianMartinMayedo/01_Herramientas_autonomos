  <!-- ── Fuentes: Bricolage Grotesque (titulares) + Figtree (cuerpo) ── -->

  <!--
    ══════════════════════════════════════════════════════════════
    GOOGLE ANALYTICS 4
    ──────────────────────────────────────────────────────────────
    PASOS PARA ACTIVAR:
    1. Ve a analytics.google.com → Crear propiedad → Web
    2. Copia tu Measurement ID (G-XXXXXXXXXX)
    3. Reemplaza G-XXXXXXXXXX por tu ID real en las dos líneas de abajo
    4. Descomenta el bloque (quita los comentarios 
    5. En producción: define VITE_GA_MEASUREMENT_ID en tus variables de entorno

    NOTA: El Measurement ID también sirve como identificador en adminStore.ts
    para generar el enlace directo a GA4 desde el panel de analíticas.
    ══════════════════════════════════════════════════════════════
    -->

  <!--
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title: document.title,
        send_page_view: true
      });
    </script>
    -->
  <script>
    (function () {
      var storageKey = 'ha-theme';
      var defaultTheme = 'light';
      var root = document.documentElement;

      try {
        var raw = window.localStorage.getItem(storageKey);
        var parsed = raw ? JSON.parse(raw) : null;
        var persistedTheme = parsed && parsed.state && parsed.state.theme;
        var theme = persistedTheme === 'dark' || persistedTheme === 'light' ? persistedTheme : defaultTheme;

        root.setAttribute('data-theme', theme);
        root.classList.toggle('dark', theme === 'dark');
      } catch (error) {
        root.setAttribute('data-theme', defaultTheme);
        root.classList.remove('dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
